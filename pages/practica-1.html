<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practica 1 | Taller Claude Agentes IA</title>
  <link rel="icon" type="image/png" href="../assets/images/logo-kodigo.png">
  <link rel="apple-touch-icon" href="../assets/images/logo-kodigo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/site.css">
</head>
<body data-practice-id="bloque-1">
  <main class="py-4">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <a class="btn btn-sm k-btn-outline" href="../index.html#ruta">Volver a ruta principal</a>
        <div class="k-mode-toggle" role="group" aria-label="Modo de vista">
          <button id="pageModeParticipanteBtn" class="btn btn-sm k-btn-outline" type="button">Participante</button>
          <button id="pageModeFacilitadorBtn" class="btn btn-sm k-btn-outline" type="button">Facilitador</button>
        </div>
      </div>
      <p class="small text-secondary" id="pageModeLabel">Modo actual: Participante</p>

      <article class="k-content">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-2">
          <div>
            <h1 id="practiceTitle" class="h2 mb-1">Cargando...</h1>
            <p id="practiceSummary" class="text-secondary mb-0">Resumen de practica.</p>
          </div>
          <span class="badge text-bg-secondary" id="practiceDuration">0 min</span>
        </div>
        <p id="practiceObjective" class="k-note"></p>
        <div id="practiceTags" class="mb-3"></div>
        <hr class="border-secondary">

        <div class="row g-4">
          <div class="col-lg-7">
            <h2 class="h5 mb-3">Instrucciones</h2>
            <div id="practiceSteps"></div>
            <section id="practicePromptSection">
              <h2 class="h5 mt-4 mb-3">Prompts y archivos a usar</h2>
              <div id="practicePrompts"></div>
            </section>
          </div>
          <div class="col-lg-5">
            <h2 class="h5 mb-3">Archivos requeridos del taller</h2>
            <ul id="practiceResources" class="list-group mb-4"></ul>
            <h2 class="h5 mb-3">Entregables</h2>
            <ul id="practiceDeliverables" class="list-group"></ul>
          </div>
        </div>
      </article>

      <div class="d-flex justify-content-between gap-2 flex-wrap mt-3">
        <a id="prevPracticeLink" class="btn k-btn-outline" href="../index.html#practicas">Anterior</a>
        <a id="nextPracticeLink" class="btn k-btn-primary" href="../index.html#detalle">Siguiente</a>
      </div>
    </div>
  </main>

  <script src="../assets/js/wiki-data.js"></script>
  <script src="../assets/js/practice-page.js"></script>
</body>
</html>
